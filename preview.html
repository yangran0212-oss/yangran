<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Labubu Blind Box</title>

<style>

body{
font-family: "Arial";
background: linear-gradient(180deg,#ffd6e7,#fff);
text-align:center;
margin:0;
}

header{
background:#ff6fa5;
color:white;
padding:20px;
font-size:30px;
font-weight:bold;
}

.container{
margin-top:20px;
}

.coins{
font-size:20px;
margin:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff4f87;
color:white;
font-size:18px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#ff2e6e;
}

.box{
margin-top:30px;
}

.box img{
width:180px;
transition:0.3s;
}

.shake{
animation:shake 0.6s;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(10deg)}
50%{transform:rotate(-10deg)}
75%{transform:rotate(10deg)}
100%{transform:rotate(0)}
}

.result{
margin-top:20px;
font-size:22px;
}

.gallery{
margin-top:40px;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
max-width:600px;
margin:auto;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-size:12px;
}

</style>
</head>

<body>

<header>Labubu 抽盲盒</header>

<div class="container">

<div class="coins">
金币：<span id="coins">100</span>
</div>

<button onclick="dailyReward()">每日奖励 +50</button>

<div class="box">
<img id="boxImg" src="https://i.imgur.com/6X4KQ8B.png">
</div>

<button onclick="draw()">抽盲盒 (-10)</button>

<div class="result" id="result"></div>

</div>

<div class="gallery">

<h2>我的图鉴</h2>

<div class="grid" id="collection"></div>

</div>

<script>

let coins = localStorage.getItem("coins") || 100
coins = parseInt(coins)

document.getElementById("coins").innerText = coins

const labubus = [

{name:"Forest Labubu",rarity:"普通"},
{name:"Pink Labubu",rarity:"普通"},
{name:"Blue Labubu",rarity:"普通"},
{name:"Sleepy Labubu",rarity:"普通"},
{name:"Smile Labubu",rarity:"普通"},
{name:"Cloud Labubu",rarity:"普通"},
{name:"Candy Labubu",rarity:"普通"},
{name:"Toy Labubu",rarity:"普通"},

{name:"Astronaut Labubu",rarity:"稀有"},
{name:"Pirate Labubu",rarity:"稀有"},
{name:"Ghost Labubu",rarity:"稀有"},
{name:"Knight Labubu",rarity:"稀有"},
{name:"Robot Labubu",rarity:"稀有"},
{name:"Angel Labubu",rarity:"稀有"},

{name:"Galaxy Labubu",rarity:"超稀有"},
{name:"Fire Labubu",rarity:"超稀有"},
{name:"Ice Labubu",rarity:"超稀有"},
{name:"Neon Labubu",rarity:"超稀有"},

{name:"Golden Labubu",rarity:"隐藏"},
{name:"Diamond Labubu",rarity:"隐藏"}

]

let collection = JSON.parse(localStorage.getItem("collection") || "[]")

function save(){
localStorage.setItem("coins",coins)
localStorage.setItem("collection",JSON.stringify(collection))
}

function draw(){

if(coins<10){
alert("金币不够!")
return
}

coins -=10

document.getElementById("coins").innerText = coins

let box = document.getElementById("boxImg")
box.classList.add("shake")

setTimeout(()=>{

box.classList.remove("shake")

let rand=Math.random()
let pool

if(rand<0.65){
pool=labubus.filter(x=>x.rarity=="普通")
}
else if(rand<0.9){
pool=labubus.filter(x=>x.rarity=="稀有")
}
else if(rand<0.99){
pool=labubus.filter(x=>x.rarity=="超稀有")
}
else{
pool=labubus.filter(x=>x.rarity=="隐藏")
}

let item=pool[Math.floor(Math.random()*pool.length)]

document.getElementById("result").innerText=
"你抽到了 "+item.name+" ["+item.rarity+"]"

if(!collection.includes(item.name)){
collection.push(item.name)
renderCollection()
}

save()

},600)

}

function renderCollection(){

let grid=document.getElementById("collection")
grid.innerHTML=""

labubus.forEach(l=>{

let owned=collection.includes(l.name)

let div=document.createElement("div")
div.className="card"

div.innerHTML=
owned ? "🧸 "+l.name :
"❓ 未解锁"

grid.appendChild(div)

})

}

function dailyReward(){

coins+=50
document.getElementById("coins").innerText=coins
save()

}

renderCollection()

</script>

</body>
</html>
